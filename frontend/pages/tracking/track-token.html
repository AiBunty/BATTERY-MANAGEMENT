<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Track Repair Status</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/utilities.css">
</head>
<body data-page="public-track">
  <main style="max-width:720px;margin:40px auto;padding:0 12px;">
    <article class="card u-mb-16">
      <h1>Repair Tracking</h1>
      <p class="u-muted">Enter your tracking token to view repair status timeline.</p>
      <div class="u-flex u-gap-12 u-mb-12">
        <input id="token-input" type="text" placeholder="Tracking token" style="flex:1;padding:10px;border:1px solid var(--color-border);border-radius:6px;">
        <button class="btn btn--primary" type="button">Track</button>
      </div>
      <div class="state">Status updates will appear here.</div>
    </article>
    <article class="card">
      <strong>Need help?</strong>
      <p class="u-muted">Contact your dealer with claim number or use ticket lookup page.</p>
    </article>
  </main>
</body>
</html>
